name: Manual GHCR Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Release tag for all images, like v0.1.0 or release-2026-03-31
        required: true
        type: string
      publish_latest:
        description: Also publish the latest tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    name: Build And Publish Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names and tags
        id: prep
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          set -euo pipefail

          if [[ ! "${IMAGE_TAG}" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "image_tag must be a valid Docker tag."
            echo "Example values: v0.1.0, release-2026-03-31"
            exit 1
          fi

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::7}"

          frontend_image="ghcr.io/${owner}/aegisai-frontend"
          backend_image="ghcr.io/${owner}/aegisai-backend"
          chroma_image="ghcr.io/${owner}/aegisai-chroma"

          {
            echo "short_sha=${short_sha}"
            echo "frontend_image=${frontend_image}"
            echo "backend_image=${backend_image}"
            echo "chroma_image=${chroma_image}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "frontend_tags<<EOF"
            echo "${frontend_image}:${IMAGE_TAG}"
            echo "${frontend_image}:${short_sha}"
            if [[ "${PUBLISH_LATEST}" == "true" ]]; then
              echo "${frontend_image}:latest"
            fi
            echo "EOF"

            echo "backend_tags<<EOF"
            echo "${backend_image}:${IMAGE_TAG}"
            echo "${backend_image}:${short_sha}"
            if [[ "${PUBLISH_LATEST}" == "true" ]]; then
              echo "${backend_image}:latest"
            fi
            echo "EOF"

            echo "chroma_tags<<EOF"
            echo "${chroma_image}:${IMAGE_TAG}"
            echo "${chroma_image}:${short_sha}"
            if [[ "${PUBLISH_LATEST}" == "true" ]]; then
              echo "${chroma_image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push frontend production image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.prep.outputs.frontend_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push backend production image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.prep.outputs.backend_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Mirror Chroma image to GHCR
        shell: bash
        env:
          CHROMA_SOURCE_IMAGE: docker.io/chromadb/chroma:1.5.5
          CHROMA_IMAGE: ${{ steps.prep.outputs.chroma_image }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          SHORT_SHA: ${{ steps.prep.outputs.short_sha }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          set -euo pipefail

          chroma_tags=(
            "${CHROMA_IMAGE}:${IMAGE_TAG}"
            "${CHROMA_IMAGE}:${SHORT_SHA}"
          )

          if [[ "${PUBLISH_LATEST}" == "true" ]]; then
            chroma_tags+=("${CHROMA_IMAGE}:latest")
          fi

          create_args=()
          for tag in "${chroma_tags[@]}"; do
            create_args+=(--tag "${tag}")
          done

          docker buildx imagetools create "${create_args[@]}" "${CHROMA_SOURCE_IMAGE}"

      - name: Summarize published image references
        shell: bash
        env:
          FRONTEND_IMAGE: ${{ steps.prep.outputs.frontend_image }}
          BACKEND_IMAGE: ${{ steps.prep.outputs.backend_image }}
          CHROMA_IMAGE: ${{ steps.prep.outputs.chroma_image }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          SHORT_SHA: ${{ steps.prep.outputs.short_sha }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
        run: |
          set -euo pipefail

          {
            echo "## Published Images"
            echo
            echo "- ${FRONTEND_IMAGE}:${IMAGE_TAG}"
            echo "- ${FRONTEND_IMAGE}:${SHORT_SHA}"
            echo "- ${BACKEND_IMAGE}:${IMAGE_TAG}"
            echo "- ${BACKEND_IMAGE}:${SHORT_SHA}"
            echo "- ${CHROMA_IMAGE}:${IMAGE_TAG}"
            echo "- ${CHROMA_IMAGE}:${SHORT_SHA}"
            if [[ "${PUBLISH_LATEST}" == "true" ]]; then
              echo "- ${FRONTEND_IMAGE}:latest"
              echo "- ${BACKEND_IMAGE}:latest"
              echo "- ${CHROMA_IMAGE}:latest"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
