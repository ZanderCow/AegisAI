name: Deploy Railway

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        type: string
        default: "main"
      create_missing_services:
        description: "Create missing repo-backed Railway services on this run"
        required: true
        type: choice
        default: "no"
        options:
          - "no"
          - "yes"

permissions:
  contents: read

concurrency:
  group: deploy-railway
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Railway Services
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend, chroma, and frontend
        env:
          INPUT_DEPLOY_REF: ${{ github.event.inputs.deploy_ref }}
          INPUT_CREATE_MISSING_SERVICES: ${{ github.event.inputs.create_missing_services }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT: ${{ secrets.RAILWAY_PROJECT }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
          RAILWAY_BACKEND_SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
          RAILWAY_FRONTEND_SERVICE: ${{ secrets.RAILWAY_FRONTEND_SERVICE }}
          RAILWAY_CHROMA_SERVICE: ${{ secrets.RAILWAY_CHROMA_SERVICE }}
          RAILWAY_POSTGRES_SERVICE: ${{ secrets.RAILWAY_POSTGRES_SERVICE }}
          BACKEND_SECRET_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
          BACKEND_ALGORITHM: ${{ secrets.BACKEND_ALGORITHM }}
          CHROMA_COLLECTION_NAME: ${{ secrets.CHROMA_COLLECTION_NAME }}
          FRONTEND_VITE_API_URL: ${{ secrets.FRONTEND_VITE_API_URL }}
          MOCK_PROVIDER_RESPONSES: ${{ secrets.MOCK_PROVIDER_RESPONSES }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: bash .github/scripts/railway-deploy.sh
