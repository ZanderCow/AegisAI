name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose-tests:
    name: Unit & Integration Tests (Compose)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure compose test runner is executable
        run: chmod +x ./scripts/test-compose.sh

      - name: Run compose test suite
        shell: bash
        run: |
          set -o pipefail
          ./scripts/test-compose.sh 2>&1 | tee compose-test-logs.txt

      - name: Upload Compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-test-logs
          path: compose-test-logs.txt

      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker-compose.test.yml down --volumes --remove-orphans

  e2e-compose:
    name: E2E Tests (Playwright + Compose)
    runs-on: ubuntu-latest
    needs:
      - compose-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate E2E provider secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -n "$GROQ_API_KEY" ] || [ -n "$GEMINI_API_KEY" ] || [ -n "$DEEPSEEK_API_KEY" ]; then
            exit 0
          fi

          echo "Missing E2E provider secret."
          echo "Set one of GROQ_API_KEY, GEMINI_API_KEY, or DEEPSEEK_API_KEY in repository secrets."
          exit 1

      - name: Run E2E compose tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: docker compose -f infra/docker-compose.e2e.yml up --build --abort-on-container-exit --exit-code-from e2e

      - name: Capture Compose logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.e2e.yml logs --no-color > compose-e2e-logs.txt

      - name: Upload Compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-e2e-logs
          path: compose-e2e-logs.txt

      - name: Tear down stack
        if: always()
        run: docker compose -f infra/docker-compose.e2e.yml down --volumes --remove-orphans
