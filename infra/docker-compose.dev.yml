services:
  db:
    image: postgres:15
    environment:
      # PostgreSQL container settings.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:1.5.5
    environment:
      # Chroma container settings.
      IS_PERSISTENT: ${IS_PERSISTENT:-TRUE}
      ANONYMIZED_TELEMETRY: ${ANONYMIZED_TELEMETRY:-FALSE}
    volumes:
      - chroma_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ../backend:/app
    env_file:
      - .env
    environment:
      # Backend application settings shared with production.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/auth_db}
      SECRET_KEY: ${SECRET_KEY:-test_secret_key_for_local_compose_only}
      ALGORITHM: ${ALGORITHM:-HS256}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://frontend:5173}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_SSL: ${CHROMA_SSL:-false}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-rag_documents}
      # Backend provider credentials.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MFA_ENABLED: ${MFA_ENABLED:-false}
      DUO_CLIENT_ID: ${DUO_CLIENT_ID:-}
      DUO_CLIENT_SECRET: ${DUO_CLIENT_SECRET:-}
      DUO_API_HOST: ${DUO_API_HOST:-}
      DUO_REDIRECT_URI: ${DUO_REDIRECT_URI:-http://localhost:5173/auth/duo/callback}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  add-admin-user-to-db:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ../backend:/app
      - ../infra:/infra:ro
    environment:
      # Backend bootstrap helper settings.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/auth_db}
      SECRET_KEY: ${SECRET_KEY:-test_secret_key_for_local_compose_only}
      ALGORITHM: ${ALGORITHM:-HS256}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Dev-only bootstrap credentials.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      BACKEND_HEALTH_URL: ${BACKEND_HEALTH_URL:-http://backend:8000/health}
    command: ["bash", "/infra/dev/add-admin-user-to-db.sh"]
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      # Frontend runtime setting exposed to the browser.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  chroma_data:
