services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:1.5.5
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ../backend:/app
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/auth_db
      SECRET_KEY: test_secret_key_for_e2e_tests_only
      ALGORITHM: HS256
      ENVIRONMENT: development
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_SSL: "false"
      CHROMA_COLLECTION_NAME: rag_documents
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  chroma_data:
