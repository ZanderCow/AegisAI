# Use a dedicated env file for real deployments, for example:
# docker compose --env-file infra/.env.prod -f infra/docker-compose.prod.yml up -d
# prod simulation
# on real prod dont expose database
name: infra-prod

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

 
 
  chroma:
    image: chromadb/chroma:1.5.5
    restart: unless-stopped
    environment:
      # Chroma container settings.
      IS_PERSISTENT: ${IS_PERSISTENT:-TRUE}
      ANONYMIZED_TELEMETRY: ${ANONYMIZED_TELEMETRY:-FALSE}
    volumes:
      - chroma_prod_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      # Backend application settings shared with non-test compose stacks.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/auth_db}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY before starting the production stack}
      ALGORITHM: ${ALGORITHM:-HS256}
      ENVIRONMENT: production
      CORS_ALLOWED_ORIGINS: ${PROD_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      MOCK_PROVIDER_RESPONSES: ${MOCK_PROVIDER_RESPONSES:-false}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_SSL: ${CHROMA_SSL:-false}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-rag_documents}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MFA_ENABLED: "true"
      DUO_CLIENT_ID: ${DUO_CLIENT_ID:?Set DUO_CLIENT_ID before starting the production stack}
      DUO_CLIENT_SECRET: ${DUO_CLIENT_SECRET:?Set DUO_CLIENT_SECRET before starting the production stack}
      DUO_API_HOST: ${DUO_API_HOST:?Set DUO_API_HOST before starting the production stack}
      DUO_REDIRECT_URI: ${PROD_DUO_REDIRECT_URI:-http://localhost/auth/duo/callback}
      SEED_HIGHER_TIER_USERS: true
      admin_user_username: ${admin_user_username:?Set admin_user_username before bootstrapping privileged accounts}
      admin_user_password: ${admin_user_password:?Set admin_user_password before bootstrapping privileged accounts}
      security_username: ${security_username:?Set security_username before bootstrapping privileged accounts}
      security_password: ${security_password:?Set security_password before bootstrapping privileged accounts}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command:
      [
        "bash",
        "scripts/start-backend.sh",
        "uv",
        "run",
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  # Optional one-shot privileged account bootstrap. Run only after the Alembic
  # migration step has completed successfully.
  backend-seed:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    profiles: ["bootstrap"]
    restart: "no"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/auth_db}
      ENVIRONMENT: production
      SEED_HIGHER_TIER_USERS: true
      admin_user_username: ${admin_user_username:?Set admin_user_username before bootstrapping privileged accounts}
      admin_user_password: ${admin_user_password:?Set admin_user_password before bootstrapping privileged accounts}
      security_username: ${security_username:?Set security_username before bootstrapping privileged accounts}
      security_password: ${security_password:?Set security_password before bootstrapping privileged accounts}
    command: ["python", "scripts/seed.py"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      # Frontend runtime configuration exposed through env-config.js.
      VITE_API_URL: ${PROD_VITE_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_prod_data:
  chroma_prod_data:
