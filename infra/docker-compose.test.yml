services:
  db:
    image: postgres:15
    environment:
      # PostgreSQL container settings.
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:1.5.5
    environment:
      # Chroma container settings.
      IS_PERSISTENT: ${IS_PERSISTENT:-TRUE}
      ANONYMIZED_TELEMETRY: ${ANONYMIZED_TELEMETRY:-FALSE}
    volumes:
      - chroma_test_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      # Backend application settings shared with production.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/auth_db}
      SECRET_KEY: ${SECRET_KEY:-test_secret_key_for_local_compose_only}
      ALGORITHM: ${ALGORITHM:-HS256}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://frontend:5173}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_SSL: ${CHROMA_SSL:-false}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-rag_documents}
      # Backend provider credentials.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started

  backend-test:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - test_results:/results
    environment:
      # Backend application settings for the pytest container.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/auth_db}
      SECRET_KEY: ${SECRET_KEY:-test_secret_key_for_local_compose_only}
      ALGORITHM: ${ALGORITHM:-HS256}
      ENVIRONMENT: test
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://frontend:5173}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_SSL: ${CHROMA_SSL:-false}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-rag_documents}
      # Backend provider credentials shared with dev and e2e.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    command:
      [
        "sh",
        "-c",
        "uv run pytest tests/; code=$$?; echo $$code > /results/backend-test.exit; touch /results/backend-test.done; tail -f /dev/null",
      ]
    healthcheck:
      test: ["CMD-SHELL", "[ -f /results/backend-test.done ]"]
      interval: 2s
      timeout: 2s
      retries: 30
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started

  frontend-test:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - test_results:/results
    command:
      [
        "sh",
        "-c",
        "code=$$(cat /results/backend-test.exit); if [ \"$$code\" -ne 0 ]; then echo \"Backend tests failed with code $$code\"; exit \"$$code\"; fi; npm run test -- --run",
      ]
    depends_on:
      backend-test:
        condition: service_healthy

volumes:
  chroma_test_data:
  test_results:
