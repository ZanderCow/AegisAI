name: infra-test

services:
  db:
    image: postgres:15
    environment:
      # PostgreSQL container settings
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:1.5.5
    environment:
      # Chroma container settings.
      IS_PERSISTENT: ${IS_PERSISTENT:-TRUE}
      ANONYMIZED_TELEMETRY: ${ANONYMIZED_TELEMETRY:-FALSE}
    volumes:
      - chroma_test_data:/data

  backend-test:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    environment:
      # Backend application settings for the pytest container.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/auth_db}
      SECRET_KEY: ${SECRET_KEY:-test_secret_key_for_local_compose_only}
      ALGORITHM: ${ALGORITHM:-HS256}
      ENVIRONMENT: test
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://frontend:5173}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_SSL: ${CHROMA_SSL:-false}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-rag_documents}
      # Backend provider credentials shared with dev and e2e.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SEED_HIGHER_TIER_USERS: ${SEED_HIGHER_TIER_USERS:-true}
      admin_user_username: ${admin_user_username:-}
      admin_user_password: ${admin_user_password:-}
      security_username: ${security_username:-}
      security_password: ${security_password:-}
    command: ["uv", "run", "pytest", "tests/"]
    depends_on:
      db:
        condition: service_healthy
      chroma:
        condition: service_started

  frontend-test:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    command: ["npm", "run", "test", "--", "--run"]

volumes:
  chroma_test_data:
