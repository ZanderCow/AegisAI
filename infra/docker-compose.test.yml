services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/auth_db
      SECRET_KEY: test_secret_key_for_e2e_tests_only
      ALGORITHM: HS256
      ENVIRONMENT: development
      GROQ_API_KEY: ""
      GEMINI_API_KEY: ""
      DEEPSEEK_API_KEY: ""
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  backend-test:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/auth_db
      SECRET_KEY: test_secret_key_for_e2e_tests_only
      ALGORITHM: HS256
      ENVIRONMENT: test
      GROQ_API_KEY: "test-key-placeholder"
      GEMINI_API_KEY: "test-key-placeholder"
      DEEPSEEK_API_KEY: "test-key-placeholder"
    command: ["uv", "run", "pytest", "tests/"]
    depends_on:
      db:
        condition: service_healthy

  frontend-test:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    command: ["npm", "run", "test", "--", "--run"]
    depends_on:
      backend-test:
        condition: service_completed_successfully

